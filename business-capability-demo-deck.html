<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280, initial-scale=1" />
<title>Lumen — Capability Map Follow-Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #16CBCB;
    --teal-deep: #0E9C9C;
    --teal-soft: #E8FAFA;

    --stone-50:  #FAF9F7;
    --stone-100: #F5F4F0;
    --stone-200: #E8E5DD;
    --stone-300: #D4CFC2;
    --stone-400: #A89F8C;
    --stone-500: #7A7060;
    --stone-600: #5A5346;
    --stone-700: #3D3830;
    --stone-800: #26241F;
    --stone-900: #15140F;

    --rank-top: #C7423A;
    --rank-mid: #D89A3A;
    --rank-bot: #5BA66B;
    --rank-na:  #C7C2B6;

    --rank-top-soft: #F6D8D5;
    --rank-mid-soft: #FAEAC9;
    --rank-bot-soft: #D6EBD9;
    --rank-na-soft:  #E8E5DD;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--stone-900); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    color: var(--stone-800);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .deck { position: fixed; inset: 0; }

  .slide {
    position: absolute;
    inset: 0;
    background: var(--stone-50);
    display: none;
    flex-direction: column;
    padding: 56px 80px;
    overflow: hidden;
  }
  .slide.active { display: flex; }

  .slide-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; flex: 0 0 auto; }
  .slide-tag { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--stone-500); letter-spacing: 0.08em; text-transform: uppercase; }
  .logo {
    font-weight: 700; font-size: 18px; letter-spacing: -0.01em; color: var(--stone-800);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--teal); display: inline-block; }

  h1 { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; margin: 0 0 24px; color: var(--stone-900); }
  h2 { font-size: 38px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.1; margin: 0 0 18px; color: var(--stone-900); }
  h3 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 12px; color: var(--stone-800); }
  p, li { font-size: 19px; line-height: 1.5; color: var(--stone-700); }
  strong { font-weight: 600; color: var(--stone-900); }

  ul { padding-left: 22px; margin: 0 0 18px; }
  li { margin: 6px 0; }

  code, pre, .mono { font-family: 'JetBrains Mono', monospace; }
  pre { background: var(--stone-900); color: var(--stone-100); padding: 18px 22px; border-radius: 6px; font-size: 15px; line-height: 1.6; overflow-x: auto; }
  pre .cmt { color: var(--stone-400); }
  pre .flag { color: var(--teal); }

  .pill { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--teal-soft); color: var(--teal-deep); letter-spacing: 0.04em; font-weight: 500; }

  /* Slide 1 — cover */
  .slide-cover { background: linear-gradient(180deg, var(--stone-900) 0%, var(--stone-800) 100%); color: var(--stone-100); padding: 80px 100px; }
  .slide-cover h1 { color: var(--stone-50); font-size: 72px; max-width: 18ch; }
  .slide-cover .lead { font-size: 22px; color: var(--stone-300); max-width: 60ch; margin-top: 8px; }
  .slide-cover .meta { margin-top: auto; display: flex; gap: 28px; color: var(--stone-400); font-size: 14px; font-family: 'JetBrains Mono', monospace; }
  .slide-cover .meta span::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--teal); margin-right: 8px; vertical-align: middle; }
  .slide-cover .logo { color: var(--stone-50); }

  /* Slide 2 — thesis loop diagram */
  .loop { display: grid; grid-template-columns: 1.05fr 1.4fr; gap: 56px; flex: 1; align-items: center; }
  .loop-svg { width: 100%; height: auto; max-height: 420px; }
  .loop-text p { font-size: 19px; margin: 0 0 14px; }

  /* Slide 3 — CLI command */
  .cli-wrap { display: grid; grid-template-rows: auto 1fr; gap: 28px; flex: 1; }
  .cli-meta { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .cli-meta .card { background: var(--stone-100); border: 1px solid var(--stone-200); border-radius: 6px; padding: 16px 18px; }
  .cli-meta .card .label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); letter-spacing: 0.06em; text-transform: uppercase; }
  .cli-meta .card .value { font-size: 18px; font-weight: 600; color: var(--stone-900); margin-top: 4px; }

  /* Heatmap grid */
  .heatmap {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 14px;
    min-height: 0;
  }
  .tile {
    border-radius: 8px; padding: 14px 16px; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; overflow: hidden;
    transition: transform 0.15s ease;
  }
  .tile.r-top { background: var(--rank-top-soft); border-color: var(--rank-top); }
  .tile.r-mid { background: var(--rank-mid-soft); border-color: var(--rank-mid); }
  .tile.r-bot { background: var(--rank-bot-soft); border-color: var(--rank-bot); }
  .tile.r-na  { background: var(--rank-na-soft);  border-color: var(--rank-na);  }

  .tile .t-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .tile .t-name { font-weight: 600; font-size: 15px; line-height: 1.25; color: var(--stone-900); }
  .tile .t-ref { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--stone-600); }
  .tile .t-foot { display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-700); margin-top: 8px; }
  .tile .rank-chip { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.6); color: var(--stone-800); letter-spacing: 0.04em; font-weight: 500; text-transform: uppercase; }

  .legend { display: flex; gap: 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-600); margin-top: 16px; align-items: center; }
  .legend .sw { display: inline-block; width: 14px; height: 14px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }

  /* L2 drill — focused L1 with all L2 children */
  .drill { display: grid; grid-template-columns: 280px 1fr; gap: 32px; flex: 1; min-height: 0; }
  .drill-sidebar { display: flex; flex-direction: column; gap: 14px; }
  .breadcrumb { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); margin-bottom: 6px; letter-spacing: 0.04em; }
  .breadcrumb .sep { margin: 0 6px; color: var(--stone-400); }
  .breadcrumb .cur { color: var(--teal-deep); }
  .drill-l1-card { background: var(--stone-100); border-left: 3px solid var(--rank-top); padding: 16px 18px; border-radius: 4px; }
  .drill-l1-card.r-top { border-color: var(--rank-top); }
  .drill-l1-card.r-mid { border-color: var(--rank-mid); }
  .drill-l1-card.r-bot { border-color: var(--rank-bot); }
  .drill-l1-card.r-na  { border-color: var(--rank-na); }
  .stat-row { display: flex; gap: 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--stone-600); margin-top: 8px; }
  .stat-row b { color: var(--stone-900); font-weight: 600; }

  .drill-children { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: 1fr; gap: 10px; min-height: 0; }

  /* Capability detail */
  .detail { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; flex: 1; min-height: 0; }
  .detail-left, .detail-right { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
  .panel { background: var(--stone-100); border-radius: 6px; padding: 18px 22px; border: 1px solid var(--stone-200); }
  .panel h4 { font-size: 13px; font-weight: 600; color: var(--stone-500); margin: 0 0 12px; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

  .process-list { list-style: none; padding: 0; margin: 0; }
  .process-list li {
    padding: 10px 0; border-bottom: 1px solid var(--stone-200);
    display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center;
    font-size: 15px; margin: 0;
  }
  .process-list li:last-child { border-bottom: none; }
  .process-list .pname { color: var(--stone-900); font-weight: 500; }
  .process-list .conf { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); }
  .process-list .arrow { color: var(--teal-deep); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

  .l3-list { list-style: none; padding: 0; margin: 0; }
  .l3-list li {
    padding: 10px 14px; margin: 6px 0; border-radius: 4px; background: var(--stone-50); border-left: 2px solid var(--teal);
    font-size: 15px; color: var(--stone-800); display: flex; justify-content: space-between; align-items: center;
  }
  .l3-list .l3-ref { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); }

  /* Radar chart */
  .radar-wrap { display: flex; flex-direction: column; align-items: center; }
  .radar-svg { width: 100%; max-width: 240px; height: auto; }
  .radar-legend { display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 3px 10px; font-size: 12px; color: var(--stone-700); margin-top: 6px; width: 100%; max-width: 360px; }
  .radar-legend .dim { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--stone-600); }
  .radar-legend .score { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--stone-900); font-weight: 600; text-align: right; }

  /* SIPOC process draft */
  .sipoc { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sipoc-col { background: var(--stone-50); border: 1px solid var(--stone-200); border-radius: 4px; padding: 10px 12px; }
  .sipoc-col .h { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--teal-deep); letter-spacing: 0.08em; margin-bottom: 6px; font-weight: 600; }
  .sipoc-col .b { font-size: 13px; color: var(--stone-800); line-height: 1.35; }

  /* Pilot table */
  .pilot-table { width: 100%; border-collapse: collapse; font-size: 17px; }
  .pilot-table th, .pilot-table td { text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--stone-200); }
  .pilot-table th { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; background: var(--stone-100); }
  .pilot-table td:first-child { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--teal-deep); width: 80px; }

  .needs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }
  .needs-grid .col { background: var(--stone-100); padding: 18px 22px; border-radius: 6px; }
  .needs-grid h4 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); letter-spacing: 0.06em; text-transform: uppercase; margin: 0 0 10px; }
  .needs-grid .col.yes { border-left: 3px solid var(--teal); }
  .needs-grid .col.no  { border-left: 3px solid var(--stone-400); }
  .needs-grid li { font-size: 16px; }

  /* Commercial */
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 28px; }
  .price-card { background: var(--stone-900); color: var(--stone-50); padding: 28px 32px; border-radius: 8px; position: relative; }
  .price-card.expand { background: linear-gradient(135deg, var(--teal) 0%, var(--teal-deep) 100%); color: var(--stone-900); }
  .price-card .label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }
  .price-card .price { font-size: 44px; font-weight: 700; letter-spacing: -0.02em; margin: 8px 0 4px; }
  .price-card .terms { font-size: 14px; opacity: 0.85; }

  .contacts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .contacts .who { background: var(--stone-100); border-radius: 6px; padding: 14px 18px; }
  .contacts .name { font-weight: 600; color: var(--stone-900); font-size: 15px; }
  .contacts .role { font-size: 12px; color: var(--stone-600); margin-top: 2px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }
  .contacts .mail { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--teal-deep); margin-top: 6px; }

  /* Slide chrome — nav, indicator */
  .chrome { position: fixed; bottom: 18px; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 100; pointer-events: none; }
  .chrome > div { pointer-events: auto; }
  .dots { display: flex; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--stone-300); border: none; padding: 0; cursor: pointer; transition: all 0.15s ease; }
  .slide-cover .dots .dot { background: rgba(255,255,255,0.25); }
  .dot.active { background: var(--teal); width: 22px; border-radius: 4px; }
  .slide-counter { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); letter-spacing: 0.08em; }
  .slide-cover ~ .chrome .slide-counter { color: var(--stone-400); }

  .hint { position: fixed; top: 20px; right: 24px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--stone-400); letter-spacing: 0.08em; z-index: 100; }
  .hint kbd { background: var(--stone-200); padding: 1px 5px; border-radius: 3px; color: var(--stone-700); font-family: inherit; }
  .slide-cover ~ .hint { color: var(--stone-500); }
  .slide-cover ~ .hint kbd { background: var(--stone-700); color: var(--stone-200); }

  /* Web-UI mockup — animated onboard panel */
  .browser-chrome { background: var(--stone-200); border-radius: 8px 8px 0 0; padding: 8px 14px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--stone-300); border-bottom: none; }
  .browser-chrome .dot-r { width: 10px; height: 10px; border-radius: 50%; background: #E36B5C; }
  .browser-chrome .dot-y { width: 10px; height: 10px; border-radius: 50%; background: #E5B442; }
  .browser-chrome .dot-g { width: 10px; height: 10px; border-radius: 50%; background: #58B26C; }
  .browser-chrome .url-bar { flex: 1; background: var(--stone-50); border-radius: 4px; padding: 4px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-700); margin-left: 12px; border: 1px solid var(--stone-300); }
  .browser-body { background: var(--stone-50); border: 1px solid var(--stone-300); border-top: none; border-radius: 0 0 8px 8px; flex: 1; padding: 24px 32px; display: flex; flex-direction: column; gap: 20px; min-height: 0; overflow: hidden; }

  .app-shell { display: grid; grid-template-columns: 200px 1fr; gap: 0; flex: 1; min-height: 0; }
  .app-sidebar { background: var(--stone-100); border-right: 1px solid var(--stone-200); padding: 16px 14px; display: flex; flex-direction: column; gap: 4px; border-radius: 4px 0 0 4px; }
  .app-sidebar .item { padding: 8px 10px; border-radius: 4px; font-size: 13px; color: var(--stone-600); display: flex; align-items: center; gap: 8px; }
  .app-sidebar .item.active { background: var(--teal-soft); color: var(--teal-deep); font-weight: 500; }
  .app-sidebar .item .ico { width: 14px; height: 14px; display: inline-block; }
  .app-sidebar .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--stone-400); letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 10px 4px; }

  .app-main { padding: 0 0 0 28px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
  .app-h { display: flex; align-items: baseline; justify-content: space-between; }
  .app-title { font-size: 22px; font-weight: 700; color: var(--stone-900); margin: 0; }
  .app-sub { font-size: 12px; color: var(--stone-500); font-family: 'JetBrains Mono', monospace; }

  .form-row { display: flex; gap: 12px; align-items: stretch; }
  .form-row input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--stone-300); border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--stone-800); background: var(--stone-50);
  }
  .form-row input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 2px var(--teal-soft); }
  .btn-primary {
    background: var(--teal); color: var(--stone-900); border: none; padding: 10px 22px; border-radius: 4px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-primary:disabled { background: var(--stone-300); color: var(--stone-500); cursor: not-allowed; }
  .btn-secondary {
    background: transparent; color: var(--teal-deep); border: 1px solid var(--teal); padding: 9px 22px; border-radius: 4px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  }

  .stages { display: flex; flex-direction: column; gap: 5px; flex: 1; min-height: 0; }
  .stage {
    display: grid; grid-template-columns: 24px 1fr auto auto; gap: 12px; align-items: center;
    padding: 7px 14px; background: var(--stone-100); border-radius: 4px; border-left: 3px solid var(--stone-300);
    opacity: 0.35; transition: opacity 0.4s, border-left-color 0.4s, background 0.4s;
  }
  .stage .s-name { font-size: 14px; color: var(--stone-800); font-weight: 500; }
  .stage .s-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); }
  .stage .s-dur  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-600); min-width: 50px; text-align: right; }
  .stage .s-ico { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
  .stage .s-ico svg { width: 18px; height: 18px; }
  .stage .s-ico .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--stone-300); display: block; }
  .stage .check { stroke: var(--teal-deep); stroke-width: 2.5; fill: none; }
  .stage.done {
    opacity: 1; border-left-color: var(--teal); background: var(--teal-soft);
  }
  .stage.done .dot { background: var(--teal); }
  .stage.running {
    opacity: 1; border-left-color: var(--rank-mid); background: var(--rank-mid-soft);
  }
  .stage.running .spinner {
    width: 14px; height: 14px; border: 2px solid var(--rank-mid); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .completion-banner {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-deep) 100%);
    color: var(--stone-900); padding: 14px 20px; border-radius: 6px;
    display: none; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 16px rgba(22, 203, 203, 0.25);
  }
  .completion-banner.show { display: flex; animation: fadeUp 0.4s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .completion-banner .ban-l { font-weight: 600; font-size: 15px; }
  .completion-banner .ban-r { font-family: 'JetBrains Mono', monospace; font-size: 12px; opacity: 0.85; }

  /* Executable process slide */
  .exec-wrap { display: grid; grid-template-columns: 1fr 1.1fr; gap: 28px; flex: 1; min-height: 0; }
  .exec-source { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .exec-source pre { flex: 1; font-size: 12.5px; line-height: 1.55; margin: 0; overflow: auto; }
  .exec-source .src-head { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--stone-500); letter-spacing: 0.06em; text-transform: uppercase; }
  pre .kw { color: #E58E5C; font-weight: 500; }
  pre .str { color: #9FE39F; }
  pre .num { color: #C9B6FF; }
  pre .role { color: var(--teal); }

  .exec-flow { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
  .swim {
    display: grid; grid-template-columns: 130px 1fr; gap: 10px; align-items: center;
    background: var(--stone-100); border-radius: 4px; padding: 10px 14px; min-height: 56px;
  }
  .swim .lane { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--stone-500); letter-spacing: 0.06em; text-transform: uppercase; }
  .swim .steps { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .swim .step {
    background: var(--stone-50); border: 1px solid var(--stone-300); border-radius: 4px;
    padding: 6px 10px; font-size: 12px; color: var(--stone-800); position: relative;
  }
  .swim .step.active { border-color: var(--teal); background: var(--teal-soft); color: var(--teal-deep); font-weight: 500; }
  .swim .step .sla { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--stone-500); margin-left: 6px; }
  .swim .arrow { color: var(--stone-400); font-family: 'JetBrains Mono', monospace; }
  .swim .decision { background: var(--rank-mid-soft); border-color: var(--rank-mid); transform: rotate(0); padding: 6px 10px; }

  /* C-suite analytics */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .kpi {
    background: var(--stone-100); border-radius: 6px; padding: 10px 16px; border-top: 3px solid var(--teal);
  }

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;

    else e.setAttribute(k, v);

  return e;

function radar(maturity) {
  const dims = [
    { key: 'strategy', label: 'Strategy' },
    { key: 'processPerformance', label: 'Process Perf' },
    { key: 'technologyAndData', label: 'Tech & Data' },
    { key: 'peopleAndSkills', label: 'People' },
    { key: 'riskAndCompliance', label: 'Risk & Comp' },
  ];
  const cx = 170, cy = 160, r = 130;
  const n = dims.length;

    const v = (maturity[d.key] || 0) / 5;
    const a = -Math.PI / 2 + (i * 2 * Math.PI) / n;

  });

  });

  const rings = [1, 2, 3, 4, 5].map(k => {
    const f = k / 5;
    const ringPts = Array.from({ length: n }, (_, i) => {
      const a = -Math.PI / 2 + (i * 2 * Math.PI) / n;
      return `${cx + Math.cos(a) * r * f},${cy + Math.sin(a) * r * f}`;

    return `<polygon points="${ringPts}" fill="none" stroke="#D4CFC2" stroke-width="${k === 5 ? 1.5 : 0.7}" opacity="${k === 5 ? 1 : 0.6}"/>`;

  const w = 360, h = 60;
  const minV = 8, maxV = 12;
  const coords = pts.map((v, i) => {
    const x = (i / (pts.length - 1)) * w;
    const y = h - ((v - minV) / (maxV - minV)) * (h - 8) - 4;
    return `${x},${y}`;
  }).join(' ');

  spark.innerHTML = `

  heatPanel.append(el('h4', {}, 'Maturity heat-strip · all 10 L1 capabilities × 5 dimensions (1 = weak, 5 = strong)'));

    const dims = ['strategy', 'processPerformance', 'technologyAndData', 'peopleAndSkills', 'riskAndCompliance'];
    dims.forEach(dk => {
      const v = n.maturity[dk];
      heat.append(el('div', { class: 'cell m-' + v }, v));
    });
  });
  heatPanel.append(heat);

  mid.append(left, sparkPanel);
  rows.append(mid, heatPanel);
  s.append(rows);
  return s;
}

  const prices = el('div', { class: 'price-grid' });

  s.append(prices);

  s.append(el('h3', { style: 'margin-top: 8px;' }, 'Contacts'));
  const contacts = el('div', { class: 'contacts' });

}

/* ============== ASSEMBLE & NAVIGATE ============== */

const deck = document.getElementById('deck');
const dots = document.getElementById('dots');
const counter = document.getElementById('counter');

const slides = [slideCover, slideThesis, slideCli, slideWebUi, slideHeatmap, slideDrill, slideDetail, slideExecProcess, slideCsuite, slideSapIntegration, slideLeanixIntegration, slidePilot, slideExpansion, slideCommercial];
slides.forEach((build, i) => {
  const node = build();
  deck.append(node);
  const d = el('button', { class: 'dot', 'aria-label': 'Slide ' + (i + 1) });
  d.addEventListener('click', () => go(i));
  dots.append(d);
});

let current = 0;
const animationTimers = [];
function clearAnimations() {
  while (animationTimers.length) clearTimeout(animationTimers.pop());
}
function runWebUiAnimation(slideNode) {
  const stages = slideNode.querySelectorAll('.stage');
  const banner = slideNode.querySelector('.completion-banner');
  if (!stages.length) return;
  stages.forEach(s => s.classList.remove('done', 'running'));
  if (banner) banner.classList.remove('show');

  const realDurMs = [3200, 4800, 100, 18300, 9700, 41600, 200];
  const total = realDurMs.reduce((a, b) => a + b, 0);
  const compressionTarget = 7000;
  const scale = compressionTarget / total;
  let acc = 0;
  realDurMs.forEach((d, i) => {
    const start = acc;
    const end = acc + d * scale;
    acc = end;
    animationTimers.push(setTimeout(() => {
      if (stages[i]) stages[i].classList.add('running');
    }, start));
    animationTimers.push(setTimeout(() => {
      if (stages[i]) {
        stages[i].classList.remove('running');
        stages[i].classList.add('done');
      }
      if (i === realDurMs.length - 1 && banner) banner.classList.add('show');
    }, end));
  });
}
function go(i) {
  current = (i + slides.length) % slides.length;
  const allSlides = deck.querySelectorAll('.slide');
  allSlides.forEach((s, idx) => s.classList.toggle('active', idx === current));
  dots.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === current));
  counter.textContent = String(current + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');

  clearAnimations();
  const active = allSlides[current];
  if (active && active.querySelector('[data-anim-reset="webui"]')) {
    runWebUiAnimation(active);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(current + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(current - 1); }
  else if (e.key === 'Home') { e.preventDefault(); go(0); }
  else if (e.key === 'End') { e.preventDefault(); go(slides.length - 1); }
  else if (e.key === 'f' || e.key === 'F') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }
  else if (/^[1-9]$/.test(e.key)) { e.preventDefault(); go(parseInt(e.key, 10) - 1); }
});

go(0);
</script>
